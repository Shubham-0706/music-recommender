<!DOCTYPE html>
<html>

<head>

    <title>Music Recommendation System</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

    <div class="container">

        <h1>🎵 Music Recommendation System</h1>

        <form method="POST">

            <select name="song">

                {% for song in songs %}

                <option value="{{song}}">
                    {{song}}
                </option>

                {% endfor %}

            </select>

            <button type="submit">
                Recommend
            </button>

        </form>

        <div class="result">

            <h2>Recommended Songs</h2>

            {% for song in recommendations %}

            <p>{{song}}</p>

            {% endfor %}

        </div>

    </div>

</body>

</html>
